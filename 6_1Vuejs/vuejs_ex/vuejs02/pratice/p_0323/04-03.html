<div id="app">
1보다 큰 수 : <input type="text" v-model.number="num"/>

1부터 입력한 값까지의 합 : <span>{{sum()}} <br>
</div>
<script src ="https://unpkg. vue "></script>
<script>

let vm = Vue.createApp(
    {
        name: "App",
data() {
return { num: 0 };
},
computed :{
      sum() {
            console.log("## num :" + this.num);
            let n = parseInt(this.num);
            if(Number.isNaN(n)) return 0;
            return (n*(n+1))/2;

      },

}
  }
).mount("#app");

</script>
